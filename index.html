<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h2on.io</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐻‍❄️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f0efed;
            color: #1a1a1a;
            overflow: hidden;
            height: 100vh;
        }

        /* ── Grid background ── */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Color blobs ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(167, 139, 250, 0.35);
            top: -10%;
            right: -5%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: rgba(251, 191, 36, 0.3);
            bottom: 10%;
            left: -5%;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: rgba(59, 130, 246, 0.3);
            top: 40%;
            right: 20%;
            animation-delay: -14s;
        }

        .blob-4 {
            width: 300px;
            height: 300px;
            background: rgba(52, 211, 153, 0.25);
            bottom: -5%;
            right: 40%;
            animation-delay: -3s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 30px) scale(1.02); }
        }

        /* ── Landing ── */
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* ── Text block ── */
        .text-block {
            text-align: left;
            font-size: 5vw;
            font-weight: 900;
            letter-spacing: -0.03em;
        }

        .text-block .line-static {
            color: #1a1a1a;
            line-height: 1.2;
        }

        /* ── Slot word ── */
        .slot-wrapper {
            overflow: hidden;
            height: 1.3em;
            position: relative;
        }

        .slot-track {
            position: relative;
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .slot-word {
            line-height: 1.3;
            height: 1.3em;
            display: flex;
            align-items: center;
            color: rgba(0, 0, 0, 0.15);
            opacity: 0.4;
            transition: color 0.4s ease, opacity 0.4s ease, filter 0.4s ease;
        }

        .slot-word.active {
            color: #1a1a1a;
            opacity: 1;
        }

        .slot-word.leaving {
            opacity: 0;
            filter: blur(4px);
        }

        /* ── Bottom controls ── */
        .btn-enter {
            margin-top: 48px;
            font-family: "Inter", sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            z-index: 2;
        }

        .btn-enter:hover {
            color: #1a1a1a;
        }

        .btn-enter span {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .btn-enter:hover span {
            transform: translateX(4px);
        }

        .wiki-name {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* ── Fade-out transition ── */
        body.fade-out {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <section class="landing">
        <div class="text-block">
            <div class="line-static">Knowledge</div>
            <div class="line-static">is</div>
            <div class="slot-wrapper">
                <div class="slot-track" id="slot">
                    <!-- words populated by JS -->
                </div>
            </div>
        </div>

        <a href="pages/wiki.html?from=landing" class="btn-enter">Enter <span>&rarr;</span></a>
        <div class="wiki-name">h2on's wiki</div>
    </section>

    <script>
        const words = [
            "🐻‍❄️.",
            "experience.",
            "pleasure.",
            "wealth.",
            "life.",
            "power.",
            "journey.",
            "everything.",
        ];

        const slot = document.getElementById("slot");
        const ITEM_HEIGHT_EM = 1.3;

        // Build slot items
        words.forEach((w, i) => {
            const div = document.createElement("div");
            div.className = "slot-word";
            div.textContent = w;
            if (i === 0) div.classList.add("active");
            slot.appendChild(div);
        });

        // Duplicate first few for seamless wrap
        for (let i = 0; i < 2; i++) {
            const div = document.createElement("div");
            div.className = "slot-word";
            div.textContent = words[i];
            slot.appendChild(div);
        }

        const allSlots = slot.querySelectorAll(".slot-word");
        let current = 0;
        const HOLD = 1200;

        function next() {
            // Mark current as leaving
            allSlots[current].classList.remove("active");
            allSlots[current].classList.add("leaving");
            current++;

            // Slide up
            slot.style.transform = `translateY(-${current * ITEM_HEIGHT_EM}em)`;

            // Highlight new
            allSlots[current].classList.add("active");

            // Clean up leaving class
            const prev = current - 1;
            setTimeout(() => {
                allSlots[prev].classList.remove("leaving");
            }, 500);

            // Seamless loop reset
            if (current >= words.length) {
                setTimeout(() => {
                    slot.style.transition = "none";
                    allSlots.forEach(el => {
                        el.style.transition = "none";
                        el.classList.remove("active", "leaving");
                    });

                    current = 0;
                    slot.style.transform = `translateY(0)`;
                    allSlots[0].classList.add("active");

                    slot.offsetHeight;
                    slot.style.transition = "transform 0.7s cubic-bezier(0.22, 1, 0.36, 1)";
                    allSlots.forEach(el => {
                        el.style.transition = "";
                    });
                }, 750);
            }
        }

        setInterval(next, HOLD);

        // Page transition
        document.querySelector(".btn-enter").addEventListener("click", (e) => {
            e.preventDefault();
            const href = e.currentTarget.getAttribute("href");
            document.body.classList.add("fade-out");
            setTimeout(() => { window.location.href = href; }, 300);
        });
    </script>
</body>
</html>
